services:
  - type: web
    name: erp-backend
    env: node
    region: oregon
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_TYPE
        value: sqlite
      - key: DB_PATH
        value: ./data/erp.db
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://votre-frontend.vercel.app
